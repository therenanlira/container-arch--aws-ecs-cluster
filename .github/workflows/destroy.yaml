name: Destroy

# Study environment teardown. Runs manually (Actions tab -> Run workflow) or
# on a daily schedule. Destroy order across repos is staggered by cron:
# app 09:00 UTC -> cluster 09:20 UTC -> vpc 09:40 UTC (06:00/06:20/06:40 BRT).
on:
  workflow_dispatch:
  schedule:
    - cron: "20 9 * * *"

env:
  AWS_ACCOUNT: "150100906110"
  AWS_REGION: us-east-2
  AWS_ENV: dev

jobs:
  # Builds a destroy plan and reports whether there is anything to destroy.
  check:
    name: Check for resources
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: terraform
    outputs:
      has_resources: ${{ steps.plan.outputs.has_resources }}
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/github-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.13"
          # The wrapper does not propagate terraform's real exit code to the
          # shell, which breaks -detailed-exitcode checks.
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select
        run: terraform workspace select -or-create ${{ env.AWS_ENV }}

      - name: Terraform Plan (destroy)
        id: plan
        # -detailed-exitcode: 0 = nothing to destroy, 1 = error, 2 = has changes
        run: |
          set +e
          terraform plan -destroy -detailed-exitcode -out=destroy.tfplan
          EXIT=$?
          set -e

          if [ "$EXIT" -eq 1 ]; then
            exit 1
          elif [ "$EXIT" -eq 2 ]; then
            echo "Resources found: destroy will run."
            echo "has_resources=true" >> "$GITHUB_OUTPUT"
          else
            echo "Nothing to destroy: workspace is already empty."
            echo "has_resources=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Destroy Plan
        if: steps.plan.outputs.has_resources == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: destroy-tfplan
          path: terraform/destroy.tfplan
          retention-days: 1

  # Applies the destroy plan; only runs when check found something.
  destroy:
    name: Destroy resources
    runs-on: ubuntu-latest
    needs: [check]
    if: needs.check.outputs.has_resources == 'true'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/github-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.13"
          # The wrapper does not propagate terraform's real exit code to the
          # shell, which breaks -detailed-exitcode checks.
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select
        run: terraform workspace select -or-create ${{ env.AWS_ENV }}

      - name: Download Destroy Plan
        uses: actions/download-artifact@v7
        with:
          name: destroy-tfplan
          path: terraform

      - name: Terraform Apply (destroy)
        run: terraform apply -auto-approve destroy.tfplan
