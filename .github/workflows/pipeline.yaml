name: CI/CD Pipeline

# Reusable workflow. Callers (cicd.yaml) pass the environment-specific values
# as inputs, so there is a single source of truth for every workspace.
on:
  workflow_call:
    inputs:
      aws_env:
        description: "Terraform workspace / environment (e.g. dev, prd)"
        required: true
        type: string
      aws_account:
        description: "AWS account ID"
        required: true
        type: string
      aws_region:
        description: "AWS region"
        required: true
        type: string
      deploy:
        description: "When false, run CI only (no artifact upload, no CD jobs)"
        required: false
        type: boolean
        default: true

jobs:
  # ----------------------------- CI -----------------------------
  ci-infra-test:
    name: CI Infra (Lint & Validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.13"
          # The wrapper does not propagate terraform's real exit code to the
          # shell, which breaks -detailed-exitcode checks.
          terraform_wrapper: false

      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

  ci-infra-build:
    name: CI Infra (Plan)
    runs-on: ubuntu-latest
    needs: [ci-infra-test]
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ inputs.aws_account }}:role/github-oidc-role
          aws-region: ${{ inputs.aws_region }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.13"
          # The wrapper does not propagate terraform's real exit code to the
          # shell, which breaks -detailed-exitcode checks.
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select
        run: terraform workspace select -or-create ${{ inputs.aws_env }}

      - name: Terraform Plan
        id: plan
        # -detailed-exitcode: 0 = no changes, 1 = error, 2 = changes to apply.
        # cd-infra is skipped when there is nothing to apply, saving a runner.
        run: |
          set +e
          terraform plan -detailed-exitcode -out=plan.tfplan -parallelism=2000
          EXIT=$?
          set -e

          if [ "$EXIT" -eq 1 ]; then
            exit 1
          elif [ "$EXIT" -eq 2 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No infrastructure changes."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Plan
        # Only needed when this run will actually apply something.
        if: ${{ inputs.deploy && steps.plan.outputs.has_changes == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: tfplan
          path: terraform/plan.tfplan
          retention-days: 1

  # ----------------------------- CD -----------------------------
  cd-infra:
    name: CD Infra (Apply)
    runs-on: ubuntu-latest
    needs: [ci-infra-build]
    if: ${{ inputs.deploy && needs.ci-infra-build.outputs.has_changes == 'true' }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ inputs.aws_account }}:role/github-oidc-role
          aws-region: ${{ inputs.aws_region }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.13"
          # The wrapper does not propagate terraform's real exit code to the
          # shell, which breaks -detailed-exitcode checks.
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select
        run: terraform workspace select -or-create ${{ inputs.aws_env }}

      - name: Download Plan
        uses: actions/download-artifact@v7
        with:
          name: tfplan
          path: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve plan.tfplan
