name: CI/CD Pipeline

# Reusable workflow. Callers (cicd.yaml) pass the environment-specific values
# as inputs, so there is a single source of truth for every workspace.
on:
  workflow_call:
    inputs:
      aws_env:
        description: "Terraform workspace / environment (e.g. dev, prd)"
        required: true
        type: string
      aws_account:
        description: "AWS account ID"
        required: true
        type: string
      aws_region:
        description: "AWS region"
        required: true
        type: string
      deploy:
        description: "When false, run CI only (no artifact upload, no CD jobs)"
        required: false
        type: boolean
        default: true

jobs:
  # ----------------------------- CI -----------------------------
  ci-infra-test:
    name: CI Infra (Lint & Validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.13"

      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

  ci-infra-build:
    name: CI Infra (Plan)
    runs-on: ubuntu-latest
    needs: [ci-infra-test]
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ inputs.aws_account }}:role/github-oidc-role
          aws-region: ${{ inputs.aws_region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.13"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select
        run: terraform workspace select -or-create ${{ inputs.aws_env }}

      - name: Terraform Plan
        run: terraform plan -out=plan.tfplan -parallelism=2000

      - name: Upload Plan
        # Only needed when this run will apply; skipped for CI-only validation.
        if: ${{ inputs.deploy }}
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/plan.tfplan
          retention-days: 1

  # ----------------------------- CD -----------------------------
  cd-infra:
    name: CD Infra (Apply)
    runs-on: ubuntu-latest
    needs: [ci-infra-build]
    if: ${{ inputs.deploy }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ inputs.aws_account }}:role/github-oidc-role
          aws-region: ${{ inputs.aws_region }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.13"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select
        run: terraform workspace select -or-create ${{ inputs.aws_env }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve plan.tfplan
