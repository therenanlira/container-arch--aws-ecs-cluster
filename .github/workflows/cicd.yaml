name: CI/CD

on:
  # PR dev -> main: deploy dev, validate prd (CI only)
  pull_request:
    branches: [main]
  # push / merge to main: deploy prd
  push:
    branches: [main]

jobs:
  # Dev always deploys: on PR dev -> main and again on push/merge to main.
  dev:
    uses: ./.github/workflows/pipeline.yaml
    permissions:
      id-token: write
      contents: read
    with:
      aws_env: dev
      aws_account: "150100906110"
      aws_region: us-east-2
      deploy: true

  # # PR dev -> main : validate prd only (lint, validate, plan). No artifact
  # # upload and no CD, since prd is deployed later, on push to main.
